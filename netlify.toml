[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["data/plants_enriched.json"]

[dev]
  command = "npm run dev"
  port    = 5173
  targetPort = 5173

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

# Weekly DB enrichment — Mondays 03:00 Asia/Taipei (Sundays 19:00 UTC)
[functions."enrich-cron"]
  schedule = "0 19 * * 0"
