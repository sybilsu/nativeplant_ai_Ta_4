[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["data/plants_enriched.json"]

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# SPA fallback intentionally omitted in v1 — single page app, no client routing.
# Re-add when react-router is introduced, but use Accept-header condition so it
# doesn't intercept Vite's /src/*.jsx during `netlify dev`.

[build.environment]
  NODE_VERSION = "20"

# Weekly DB enrichment — Mondays 03:00 Asia/Taipei (Sundays 19:00 UTC)
[functions."enrich-cron"]
  schedule = "0 19 * * 0"
